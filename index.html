<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Forge — Community Chat</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ══════════════════════════════════════════
       AUTH SCREEN
  ══════════════════════════════════════════ -->
  <div id="auth-screen">
    <div class="auth-card">

      <div class="auth-logo">
        <div class="auth-logo-icon">⚡</div>
        <h1>Forge</h1>
      </div>

      <div class="auth-tabs">
        <button class="auth-tab active" id="tab-login">Sign In</button>
        <button class="auth-tab" id="tab-signup">Sign Up</button>
      </div>

      <!-- Login -->
      <form class="auth-form active" id="login-form" novalidate>
        <div class="form-group">
          <label for="login-email">Email</label>
          <input type="email" id="login-email" placeholder="you@example.com" autocomplete="email" required />
        </div>
        <div class="form-group">
          <label for="login-password">Password</label>
          <input type="password" id="login-password" placeholder="••••••••" autocomplete="current-password" required />
        </div>
        <p class="auth-error" id="login-error"></p>
        <button type="submit" class="auth-submit">Sign In</button>
      </form>

      <!-- Sign Up -->
      <form class="auth-form" id="signup-form" novalidate>
        <div class="form-group">
          <label for="signup-username">Username</label>
          <input type="text" id="signup-username" placeholder="CoolDeveloper" maxlength="32" autocomplete="username" required />
        </div>
        <div class="form-group">
          <label for="signup-email">Email</label>
          <input type="email" id="signup-email" placeholder="you@example.com" autocomplete="email" required />
        </div>
        <div class="form-group">
          <label for="signup-password">Password</label>
          <input type="password" id="signup-password" placeholder="Min 6 characters" autocomplete="new-password" required />
        </div>
        <p class="auth-error" id="signup-error"></p>
        <button type="submit" class="auth-submit">Create Account</button>
      </form>

    </div>
  </div>

  <!-- ══════════════════════════════════════════
       APP SCREEN
  ══════════════════════════════════════════ -->
  <div id="app-screen" class="hidden">

    <!-- ── SIDEBAR ── -->
    <aside class="sidebar">

      <div class="server-header">
        <div class="server-logo">⚡</div>
        <span class="server-name">Forge Community</span>
      </div>

      <div class="sidebar-scroll">

        <!-- Channels -->
        <div class="sidebar-section-label">Text Channels</div>
        <ul id="channel-list"></ul>

        <!-- Direct Messages -->
        <div class="sidebar-section-label" style="margin-top:10px;">Direct Messages</div>

        <!-- DM Search -->
        <div class="dm-search-row">
          <input
            type="text"
            id="dm-search"
            placeholder="Find user…"
            maxlength="32"
            autocomplete="off"
          />
          <button id="dm-search-btn" title="Start DM">→</button>
        </div>

        <!-- DM List -->
        <ul id="dm-list">
          <li class="dm-placeholder">Search a username above to start a DM</li>
        </ul>

      </div>

      <!-- User Panel -->
      <div class="user-panel">
        <div class="user-avatar-wrap">
          <div id="user-avatar">?</div>
          <div class="status-dot"></div>
        </div>
        <div class="user-info">
          <span id="user-display">Loading…</span>
          <span class="user-tag">● Online</span>
        </div>
        <button id="logout-btn" title="Sign out">⏻</button>
      </div>

    </aside>

    <!-- ── CHAT MAIN ── -->
    <main class="chat-main">

      <div class="chat-header">
        <span id="channel-title">💬 #general</span>
      </div>

      <div id="messages-area">
        <div class="welcome-banner">
          <span class="welcome-icon">⚡</span>
          <h2>Welcome to Forge</h2>
          <p>Chat in channels or send direct messages to individuals.</p>
        </div>
      </div>

      <div class="input-area">
        <div class="input-bar">
          <textarea
            id="message-input"
            placeholder="Message #general"
            rows="1"
            autocomplete="off"
            spellcheck="true"
          ></textarea>
          <button id="send-btn" title="Send">➤</button>
        </div>
      </div>

    </main>

  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
